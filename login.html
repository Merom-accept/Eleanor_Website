<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Eleanor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #F4EFE4;
      --umber:  #2B200F;
      --terra:  #B85C30;
      --sienna: #8B4220;
      --gold:   #C9973A;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--umber);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .card {
      width: 100%;
      max-width: 380px;
      margin: 1.5rem;
      background: var(--cream);
      padding: 2.5rem 2rem 2rem;
      border-radius: 3px;
    }

    .logo {
      font-size: 1.5rem;
      letter-spacing: 0.12em;
      color: var(--umber);
      margin-bottom: 0.25rem;
    }
    .logo span {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--terra);
      margin: 1.25rem 0 1.75rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--umber);
      margin-bottom: 0.45rem;
    }

    .pw-wrap {
      position: relative;
    }

    .pw-wrap input {
      width: 100%;
      padding: 0.65rem 2.5rem 0.65rem 0.75rem;
      border: 1px solid rgba(43,32,15,0.2);
      border-radius: 2px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--umber);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .pw-wrap input:focus { border-color: var(--terra); }

    .pw-toggle {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem;
      color: rgba(43,32,15,0.35);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: var(--umber); }

    .error {
      font-size: 0.78rem;
      color: #c0392b;
      margin-top: 0.6rem;
      min-height: 1.2em;
    }

    button {
      margin-top: 1.4rem;
      width: 100%;
      padding: 0.75rem;
      background: var(--terra);
      color: var(--cream);
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: var(--sienna); }
    button:active { opacity: 0.85; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Eleanor <br><span>Admin</span></div>
    <div class="divider"></div>

    <label for="pw">Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw" autofocus autocomplete="current-password">
      <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password" tabindex="-1">
        <!-- eye icon — swapped by JS -->
        <svg id="iconShow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="iconHide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <div class="error" id="err" aria-live="polite"></div>

    <button id="btn">Enter</button>
  </div>

  <script>
    const pw        = document.getElementById('pw');
    const btn       = document.getElementById('btn');
    const err       = document.getElementById('err');
    const pwToggle  = document.getElementById('pwToggle');
    const iconShow  = document.getElementById('iconShow');
    const iconHide  = document.getElementById('iconHide');

    pwToggle.addEventListener('click', () => {
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      iconShow.style.display = isHidden ? 'none'  : '';
      iconHide.style.display = isHidden ? ''      : 'none';
      pwToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    async function login() {
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Checking…';

      try {
        const res = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ password: pw.value })
        });
        if (res.ok) {
          window.location.href = '/admin';
        } else {
          const data = await res.json().catch(() => ({}));
          err.textContent = data.error || 'Incorrect password.';
          pw.value = '';
          pw.focus();
        }
      } catch {
        err.textContent = 'Could not reach the server.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    }

    btn.addEventListener('click', login);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
